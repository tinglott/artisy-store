<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="google-site-verification" content="902d37e02b9e78ac"/>

<meta content="width=device-width,initial-scale=1.0" name="viewport"/>
<title>ARTISY. &mdash; Premium eBooks, Audiobooks &amp; Digital Guides</title>
<meta content="Premium eBooks, music tracks &amp; digital guides — handpicked, instantly yours, forever. Secure Stripe payments." name="description"/>
<link href="https://fonts.googleapis.com" rel="preconnect"/>
<link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600;700;800&amp;family=DM+Sans:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth}
body{
  background: linear-gradient(135deg, #1a1a1a 0%, #2a2a2a 50%, #1a2a3a 100%);
  background-attachment: fixed;
  position: relative;
  color:#fff;
  font-family:'DM Sans',sans-serif;
  overflow-x:hidden
}

body::before {
  content: '';
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background-image: repeating-linear-gradient(
    45deg,
    transparent,
    transparent 2px,
    rgba(255,107,53,0.02) 2px,
    rgba(255,107,53,0.02) 4px
  );
  pointer-events: none;
  z-index: -1;
}
::selection{background:#FF6B35;color:#09080A}
::-webkit-scrollbar{width:8px}
::-webkit-scrollbar-track{background:#09080A}
::-webkit-scrollbar-thumb{background:#FF6B3544;border-radius:4px}
::-webkit-scrollbar-thumb:hover{background:#FF6B3588}
.nav{position:fixed;top:0;left:0;right:0;z-index:1000;background:rgba(9,8,10,.85);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-bottom:1px solid #ffffff08;padding:0 48px;height:72px;display:flex;align-items:center;justify-content:space-between}
.nav-logo{font-family:'Playfair Display',serif;font-size:28px;font-weight:800;color:#FF6B35;text-decoration:none;letter-spacing:1px;text-shadow:0 2px 8px rgba(255,107,53,0.3)}
.nav-links{display:flex;gap:32px;align-items:center}
.nav-links a{color:#FF6B35;text-decoration:none;font-size:18px;font-weight:500;letter-spacing:.5px;transition:color .3s;text-shadow:0 2px 8px rgba(255,107,53,0.3)}
.nav-links a:hover{color:#FF6B35}
.hero{position:relative;min-height:100vh;display:flex;align-items:center;justify-content:center;text-align:center;padding:120px 24px 80px}
.hero-bg{position:absolute;inset:0;z-index:0}
.hero-bg img{width:100%;height:100%;object-fit:cover;opacity:.35}
.hero-bg::after{content:'';position:absolute;inset:0;background:linear-gradient(to bottom,rgba(9,8,10,1) 0%,rgba(9,8,10,0.3) 20%,rgba(9,8,10,0.3) 60%,rgba(9,8,10,1) 100%)}
.hero-content{position:relative;z-index:1;max-width:800px}
.hero h1{font-family:'Playfair Display',serif;font-size:clamp(42px,7vw,80px);font-weight:800;line-height:1.05;margin-bottom:24px;background:linear-gradient(135deg,#fff 0%,#FF6B35 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.hero p{font-size:clamp(16px,2vw,20px);color:#999;line-height:1.7;margin-bottom:40px;max-width:600px;margin-left:auto;margin-right:auto}
.hero-cta{display:inline-block;padding:14px 28px;background:#FF6B35;color:#09080A;font-family:'DM Sans',sans-serif;font-weight:700;font-size:16px;text-decoration:none;border-radius:50px;letter-spacing:.5px;transition:all .3s;box-shadow:0 4px 30px rgba(255,107,53,.3)}
.hero-cta:hover{background:#FF6B35;filter:brightness(1.1);transform:translateY(-2px);box-shadow:0 8px 40px rgba(255,107,53,.4)}
.mq-wrap{border-top:1px solid #ffffff08;border-bottom:1px solid #ffffff08;padding:20px 0;overflow:hidden;background:#0d0c10}
.mq{display:flex;animation:mq 30s linear infinite;width:max-content}
.mq span{white-space:nowrap;font-family:'DM Sans',sans-serif;font-size:14px;font-weight:500;color:#666;letter-spacing:2px;text-transform:uppercase;padding:0 40px}
.mq span::before{content:'\2726';margin-right:40px;color:#FF6B35}
@keyframes mq{0%{transform:translateX(0)}100%{transform:translateX(-50%)}}
.section{padding:100px 48px;max-width:1400px;margin:0 auto}
.section-label{font-family:'DM Sans',sans-serif;font-size:12px;font-weight:700;color:#FF6B35;text-transform:uppercase;letter-spacing:3px;margin-bottom:16px}
.section-title{font-family:'Playfair Display',serif;font-size:clamp(28px,4vw,44px);font-weight:700;color:#fff;margin-bottom:16px}
.section-sub{font-size:16px;color:#777;line-height:1.6;max-width:600px;margin-bottom:48px}
.pgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:24px}
.fgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(360px,1fr));gap:32px}
.cgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:20px}
.cc{background:#12111A;border:1px solid #1a1925;border-radius:16px;padding:32px 24px;text-align:center;transition:all .3s;cursor:pointer}
.cc:hover{border-color:#FF6B35;transform:translateY(-4px);box-shadow:0 20px 40px rgba(255,107,53,.08)}
.ci{font-size:36px;margin-bottom:16px;display:block}
.cn{font-family:'Playfair Display',serif;font-size:18px;font-weight:600;color:#fff}
.cs{font-size:13px;color:#666;margin-top:8px}
.tgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:24px}
.tc{background:#12111A;border:1px solid #1a1925;border-radius:16px;padding:32px;transition:all .3s}
.tc:hover{border-color:#FF6B3533}
.ts{color:#FF6B35;font-size:16px;margin-bottom:16px;letter-spacing:2px}
.tt{font-size:15px;color:#bbb;line-height:1.7;margin-bottom:20px;font-style:italic}
.ta{font-weight:700;color:#fff;font-size:14px}
.tr{font-size:12px;color:#666;margin-top:4px}
.footer{border-top:1px solid #ffffff08;padding:40px 48px;text-align:center}
.footer p{font-size:13px;color:#555;letter-spacing:1px}
@media(max-width:768px){.nav{padding:0 20px}.nav-links{gap:20px}.section{padding:60px 20px}.fgrid{grid-template-columns:1fr}.pgrid{grid-template-columns:repeat(auto-fill,minmax(240px,1fr))}.cgrid{grid-template-columns:repeat(2,1fr)}.tgrid{grid-template-columns:1fr}}
@media(max-width:480px){.nav-links a:not(:last-child){display:none}.pgrid{grid-template-columns:1fr}.cgrid{grid-template-columns:1fr}}
</style>
<!-- REST OF HTML CONTENT REMAINS THE SAME -->
