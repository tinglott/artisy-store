<script>
// Web Speech API TTS (replaces embedded audio)
let speechUtterance = null;
let isSpeaking = false;

function initVoiceNarration() {
    if (!('speechSynthesis' in window)) {
        console.log('Speech synthesis not supported');
        return;
    }
    console.log('Web Speech API ready for narration');
}

function speakText(text) {
    if (!('speechSynthesis' in window)) return;
    window.speechSynthesis.cancel();
    speechUtterance = new SpeechSynthesisUtterance(text);
    speechUtterance.rate = 0.9;
    speechUtterance.pitch = 1.0;
    speechUtterance.volume = 1.0;
    // Prefer a natural-sounding voice
    const voices = window.speechSynthesis.getVoices();
    const preferredVoice = voices.find(v => 
        v.name.includes('Google') || v.name.includes('Natural') || v.name.includes('Female')
    );
    if (preferredVoice) speechUtterance.voice = preferredVoice;
    window.speechSynthesis.speak(speechUtterance);
    isSpeaking = true;
    speechUtterance.onend = () => { isSpeaking = false; };
}

function stopSpeech() {
    if ('speechSynthesis' in window) {
        window.speechSynthesis.cancel();
        isSpeaking = false;
    }
}

function toggleAudio() {
    if (isSpeaking) {
        stopSpeech();
        const btn = document.querySelector('.audio-btn');
        if (btn) btn.textContent = '🔊 Listen';
    } else {
        const currentPage = getCurrentPageText();
        if (currentPage) {
            speakText(currentPage);
            const btn = document.querySelector('.audio-btn');
            if (btn) btn.textContent = '⏸ Stop';
        }
    }
}

function getCurrentPageText() {
    const pageContent = document.querySelector('.page-text, .page-content, .content-area');
    return pageContent ? pageContent.innerText : '';
}

// Initialize on load
window.addEventListener('load', function() {
    window.speechSynthesis.getVoices(); // preload voices
    initVoiceNarration();
});
</script>
