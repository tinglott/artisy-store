<script>
// Web Speech API TTS (replaces embedded audio)
let speechUtterance = null;
let isSpeaking = false;

function initVoiceNarration() {
    if (!('speechSynthesis' in window)) {
        console.log('Speech synthesis not supported');
        return;
    }
    console.log('Web Speech API ready for narration');
}

function speakText(text) {
    if (!('speechSynthesis' in window)) return;
    window.speechSynthesis.cancel();
    speechUtterance = new SpeechSynthesisUtterance(text);
    speechUtterance.rate = 0.9;
    speechUtterance.pitch = 1.0;
    speechUtterance.volume = 1.0;
    // Prefer a natural-sounding voice
    const voices = window.speechSynthesis.getVoices();
    const preferredVoice = voices.find(v => 
        v.name.includes('Google') || v.name.includes('Natural') || v.name.includes('Female')
    );
    if (preferredVoice) speechUtterance.voice = preferredVoice;
    window.speechSynthesis.speak(speechUtterance);
    isSpeaking = true;
    speechUtterance.onend = () => { isSpeaking = false; };
}

function stopSpeech() {
    if ('speechSynthesis' in window) {
        window.speechSynthesis.cancel();
        isSpeaking = false;
    }
}

function toggleAudio() {
    if (isSpeaking) {
        stopSpeech();
        const btn = document.querySelector('.audio-btn');
        if (btn) btn.textContent = '🔊 Listen';
    } else {
        const currentPage = getCurrentPageText();
        if (currentPage) {
            speakText(currentPage);
            const btn = document.querySelector('.audio-btn');
            if (btn) btn.textContent = '⏸ Stop';
        }
    }
}

function getCurrentPageText() {
    const pageContent = document.querySelector('.page-text, .page-content, .content-area');
    return pageContent ? pageContent.innerText : '';
}

// Initialize on load
window.addEventListener('load', function() {
    window.speechSynthesis.getVoices(); // preload voices
    initVoiceNarration();
});
</script>

ention to these physical signals, you can start to recognize patterns that\ninfluence your overall state of being.\nNow, let\u2019s explore your activity levels. Picture yourself moving through yo", "natural calm, a settled focus? Observe your inner dialogue. Are you frequently caught in\ncycles of negative self-talk or fearful predictions? Or do you greet challenges with an open,\ncurious spirit?\nConsider these prompts for self-observation: What are the recurring themes in your thoughts?\nWhen do negative thoughts tend to arise, and what triggers them? Understanding these\nmental habits is the first step to shaping them.\nIs your emotional state often filled with a low hum of anxiety, irritability, or feeling swamped?\nOr is your default setting one of calmness and emotional stability? For example, imagine\nfacing a difficult project. One person might think, \u201cI\u2019m going to fail, this is too much for me,\u201d\nwhile another might approach it with, \u201cThis is a challenge, but I can break it down and figure it\nout.\u201d By becoming a more detached observer of your internal world, you can begin to foster a\nkinder, more constructive inner conversation. For further guidance on shaping your thoughts,\nsee [Section X: Identifying Negative Thought Patterns] and [Section Y: Cultivating Positive\nSelf-Talk].\nYour Energetic State\nHow full is your energy tank on a regular basis? When do you feel most alive and capable?\nWhen do your reserves seem to dip? Recognizing these fluctuations allows you to plan your\ndays more effectively, knowing when to push and when to pause, when to seek rest or an\nenergizing activity. Do you often feel depleted and running on empty, or do you have ample\nreserves to meet daily demands? Sleep, of course, plays a foundational role. Reflect on your\nrest. Are you getting sufficient hours? Do you wake feeling truly rejuvenated, or does morning\noften bring lingering fatigue and a struggle to shake off sleep? Inadequate rest profoun  the\n\u201crest-and-digest\u201d system that calms you down after the SNS has been activated. When the\nPNS is in charge, your heart rate and blood pressure decrease, allowing your body to relax,\nconserve energy, and focus on healing and recovery.\nThe constant interplay between the SNS and PNS significantly impacts our well-being,\nespecially concerning stress. Recognizing your body\u2019s unique stress signals is the first step\ntoward reclaiming autonomic balance. For instance, you might notice your shoulders tensing\nup and a persistent knot in your sto", "hold for four) is another effective method. These readily available techniques offer a practical\nway to manage stress and invite relaxation anywhere, providing immediate relief that can be\naccessed whenever needed.\n2. Foundational Techniques: calm, energizing, balance protocols\nThe simple act of breathing, so automatic it often goes unnoticed, holds within it a remarkable\ncapacity to influence our inner state. For millennia, various cultures have recognized this\npower, developing conscious breathing techniques, often called breathwork, as a means to\nfind calm, reduce the pressures of daily life, and even invigorate the spirit. By understanding\nand applying simple breath patterns, we can tap into our body\u2019s natural ability to find peace\nand renewal.\nUnderstanding how breathwork impacts us begins with recognizing our body\u2019s innate survival\nmechanisms. Our bodies are hardwired for survival. When faced with stress or perceived\ndanger, a primitive \u201cfight-or-flight\u201d response kicks in, flooding our system with hormones like\ncortisol and adrenaline. This ancient mechanism prepares us to either stand our ground or\nrun. In the modern world, however, this response can be triggered by everyday anxieties,\nleading to a constant state of unease, chronic stress, and persistent fatigue. Breathwork offers\na way to gently interrupt this cycle. By deliberately altering our breathing, we send
