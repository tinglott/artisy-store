<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Divine Resonance Voice Therapist</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            max-width: 500px;
            width: 100%;
            padding: 40px;
        }
        h1 {
            color: #667eea;
            margin-bottom: 10px;
            text-align: center;
            font-size: 24px;
        }
        .subtitle {
            text-align: center;
            color: #666;
            margin-bottom: 30px;
            font-size: 14px;
        }
        .chat-box {
            background: #f5f5f5;
            border-radius: 15px;
            padding: 20px;
            height: 350px;
            overflow-y: auto;
            margin-bottom: 20px;
            border: 2px solid #e0e0e0;
        }
        .message {
            margin: 10px 0;
            padding: 12px 15px;
            border-radius: 10px;
            line-height: 1.4;
        }
        .user-msg {
            background: #667eea;
            color: white;
            margin-left: 40px;
            text-align: right;
        }
        .therapist-msg {
            background: #e8e8e8;
            color: #333;
            margin-right: 40px;
        }
        .input-group {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
        }
        input {
            flex: 1;
            padding: 12px;
            border: 2px solid #667eea;
            border-radius: 10px;
            font-size: 14px;
        }
        button {
            padding: 12px 20px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-weight: bold;
        }
        button:hover { background: #764ba2; }
        .controls {
            display: flex;
            gap: 10px;
            justify-content: center;
        }
        .mic-btn, .speaker-btn {
            padding: 12px 20px;
            background: #764ba2;
            color: white;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-size: 18px;
        }
        .mic-btn:hover, .speaker-btn:hover { background: #667eea; }
        .listening { background: #ff6b6b !important; }
        .email-section {
            border-top: 2px solid #e0e0e0;
            margin-top: 25px;
            padding-top: 20px;
        }
        .email-section p {
            text-align: center;
            color: #666;
            font-size: 13px;
            margin-bottom: 12px;
        }
        .email-form {
            display: flex;
            gap: 8px;
        }
        .email-form input {
            flex: 1;
        }
        .email-form button {
            padding: 10px 15px;
            background: #764ba2;
            font-size: 13px;
            white-space: nowrap;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🌟 Divine Resonance</h1>
        <p class="subtitle">Your compassionate wellness voice therapist</p>
        <div class="chat-box" id="chatBox"></div>
        <div class="input-group">
            <input type="text" id="userInput" placeholder="Type your thoughts..." />
            <button onclick="sendMessage()">Send</button>
        </div>
        <div class="controls">
            <button class="mic-btn" onclick="startListening()">🎤 Listen</button>
            <button class="speaker-btn" onclick="toggleAudio()">🔊 Speak</button>
        </div>
        <div class="email-section">
            <p>💝 Get your FREE Sacred Cycles coloring book</p>
            <form id="emailForm" action="https://formsubmit.co/lott2395@gmail.com" method="POST" class="email-form" onsubmit="handleEmailSubmit(event)">
                <input type="email" name="email" placeholder="Your email" required />
                <button type="submit">Get Book</button>
            </form>
            <div id="thankYouMsg" style="display: none; text-align: center; margin-top: 12px; padding: 12px; background: #f0f0f0; border-radius: 8px;">
                <p style="color: #667eea; font-weight: bold; margin: 0; font-size: 14px;">✅ Thank you!</p>
                <p style="color: #666; margin: 5px 0 0 0; font-size: 12px;">Check your email for your free coloring book. We're also sharing wellness tips with you.</p>
            </div>
        </div>
    </div>

    <script>
        const responses = {
            stress: "I hear you're feeling stressed. Take a deep breath with me. What's one small thing you can do today to ease your burden?",
            tired: "Exhaustion is real, especially after long shifts. Your body is asking for rest. Have you considered what rest looks like for you?",
            anxious: "Anxiety often whispers untruths. You are safe. You are capable. What's one thing within your control right now?",
            pain: "Physical pain can be overwhelming. Sending compassion your way. Would gentle movement or stillness help right now?",
            burnout: "Burnout is a sign you've been giving a lot. You deserve to refill your own cup. What brings you joy?",
            alone: "You're not alone in this feeling. Many carry this weight. Reaching out was brave. I'm here.",
            hope: "Hope is powerful. Hold onto it. Every small step forward matters.",
            love: "Love yourself as you would a dear patient. You deserve that same compassion.",
            grateful: "Gratitude softens the heart. What else are you grateful for today?",
            default: "I hear you. That sounds important. Tell me more about what you're feeling."
        };

        function addMessage(text, isUser) {
            const chatBox = document.getElementById('chatBox');
            const msg = document.createElement('div');
            msg.className = isUser ? 'message user-msg' : 'message therapist-msg';
            msg.textContent = text;
            chatBox.appendChild(msg);
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        function getResponse(input) {
            const lower = input.toLowerCase();
            for (let key in responses) {
                if (lower.includes(key)) return responses[key];
            }
            return responses.default;
        }

        function sendMessage() {
            const input = document.getElementById('userInput');
            const text = input.value.trim();
            if (!text) return;
            addMessage(text, true);
            const response = getResponse(text);
            setTimeout(() => addMessage(response, false), 500);
            input.value = '';
        }

        function startListening() {
            if (!('webkitSpeechRecognition' in window)) {
                alert('Voice not supported on this browser');
                return;
            }
            const recognition = new webkitSpeechRecognition();
            const btn = event.target;
            btn.classList.add('listening');
            btn.textContent = '🎤 Listening...';
            recognition.onresult = (e) => {
                const text = e.results[0][0].transcript;
                document.getElementById('userInput').value = text;
                btn.classList.remove('listening');
                btn.textContent = '🎤 Listen';
                sendMessage();
            };
            recognition.start();
        }

        function toggleAudio() {
            const btn = event.target;
            btn.textContent = btn.textContent.includes('Muted') ? '🔊 Speak' : '🔊 Muted';
        }

        function handleEmailSubmit(event) {
            event.preventDefault();
            const form = event.target;
            const formData = new FormData(form);
            
            // Hide form and show thank you
            document.getElementById('emailForm').style.display = 'none';
            document.getElementById('thankYouMsg').style.display = 'block';
            
            // Submit in background
            fetch(form.action, {
                method: 'POST',
                body: formData
            }).catch(err => console.log('Email submitted'));
        }

        document.getElementById('userInput').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') sendMessage();
        });

        addMessage("Hello, I'm here to listen with compassion. What's on your heart today?", false);
    </script>
</body>
</html>
