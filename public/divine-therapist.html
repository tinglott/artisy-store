<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Divine Resonance Voice Therapist</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }
        .container { background: white; border-radius: 20px; box-shadow: 0 20px 60px rgba(0,0,0,0.3); max-width: 700px; width: 100%; padding: 40px; }
        .header { text-align: center; margin-bottom: 30px; }
        .header h1 { color: #667eea; font-size: 2em; margin-bottom: 10px; }
        .header p { color: #666; font-size: 1em; }
        .chat-box { background: #f8f9fa; border-radius: 15px; padding: 20px; height: 400px; overflow-y: auto; margin-bottom: 20px; border: 1px solid #e0e0e0; }
        .message { margin-bottom: 15px; padding: 12px 15px; border-radius: 10px; max-width: 85%; word-wrap: break-word; animation: slideIn 0.3s ease-in; }
        @keyframes slideIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .user-message { background: #667eea; color: white; margin-left: auto; text-align: right; }
        .therapist-message { background: white; color: #333; border: 1px solid #e0e0e0; text-align: left; }
        .input-section { display: flex; gap: 10px; margin-bottom: 15px; }
        input { flex: 1; padding: 12px 15px; border: 1px solid #ddd; border-radius: 8px; font-size: 1em; }
        input:focus { outline: none; border-color: #667eea; box-shadow: 0 0 0 3px rgba(102,126,234,0.1); }
        button { padding: 12px 20px; background: #667eea; color: white; border: none; border-radius: 8px; cursor: pointer; font-size: 1em; font-weight: 600; transition: background 0.3s; }
        button:hover { background: #5568d3; }
        button:disabled { background: #ccc; cursor: not-allowed; }
        .voice-section { display: flex; gap: 10px; margin-top: 15px; }
        .voice-btn { flex: 1; padding: 12px; display: flex; align-items: center; justify-content: center; gap: 8px; }
        .status { text-align: center; color: #667eea; font-size: 0.9em; margin-top: 10px; min-height: 20px; }
        .disclaimer { background: #f0f4ff; border-left: 4px solid #667eea; padding: 15px; border-radius: 5px; font-size: 0.85em; color: #555; margin-top: 20px; }
        @media (max-width: 600px) { .container { padding: 20px; } .header h1 { font-size: 1.5em; } .chat-box { height: 300px; } }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🙏 Divine Resonance Guide</h1>
            <p>Your compassionate voice therapist for stress relief & spiritual wellness</p>
        </div>

        <div class="chat-box" id="chatBox"></div>

        <div class="input-section">
            <input type="text" id="userInput" placeholder="Tell me what's on your mind..." />
            <button id="sendBtn" onclick="sendMessage()">Send</button>
        </div>

        <div class="voice-section">
            <button class="voice-btn" id="recordBtn" onclick="startListening()">🎤 Listen to me</button>
            <button class="voice-btn" id="speakBtn" onclick="speakResponse()" style="display:none;">🔊 Speak</button>
        </div>

        <div class="status" id="status">Ready to chat. Type or click 🎤</div>

        <div class="disclaimer">
            <strong>⚠️ Medical Disclaimer:</strong> This AI is for wellness support only, not a substitute for professional care.
        </div>
    </div>

    <script>
        let lastResponse = '';
        const therapistResponses = {
            stress: "I hear your stress. Let's take three deep breaths. You have the strength to navigate this.",
            anxious: "Anxiety is your mind trying to protect you. What can you control right now?",
            tired: "You've given so much. Rest isn't selfish—it's necessary. What does rest look like for you?",
            pain: "I'm here with you. Pain is often a teacher. What might it be telling you?",
            hope: "That hope is beautiful. What small step aligns with it today?"
        };

        function generateResponse(input) {
            const lower = input.toLowerCase();
            for (let key in therapistResponses) {
                if (lower.includes(key)) return therapistResponses[key];
            }
            return "Thank you for sharing. What feels most important right now?";
        }

        function addMessage(text, sender) {
            const box = document.getElementById('chatBox');
            const div = document.createElement('div');
            div.className = `message ${sender}-message`;
            div.textContent = text;
            box.appendChild(div);
            box.scrollTop = box.scrollHeight;
        }

        function sendMessage() {
            const input = document.getElementById('userInput');
            const msg = input.value.trim();
            if (!msg) return;
            addMessage(msg, 'user');
            input.value = '';
            setTimeout(() => {
                const response = generateResponse(msg);
                lastResponse = response;
                addMessage(response, 'therapist');
                document.getElementById('speakBtn').style.display = 'flex';
            }, 500);
        }

        function startListening() {
            const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
            if (!SR) {
                alert('Voice not supported on this device.');
                return;
            }
            const recognition = new SR();
            recognition.lang = 'en-US';
            recognition.onresult = (e) => {
                document.getElementById('userInput').value = e.results[0][0].transcript;
                sendMessage();
            };
            recognition.start();
        }

        function speakResponse() {
            if (!lastResponse) return;
            const utterance = new SpeechSynthesisUtterance(lastResponse);
            utterance.rate = 0.9;
            speechSynthesis.speak(utterance);
        }

        window.addEventListener('load', () => {
            addMessage("Hello, I'm your Divine Resonance Guide. I'm here to listen. What's on your heart?", 'therapist');
        });

        document.addEventListener('keypress', (e) => {
            if (e.key === 'Enter' && e.target.id === 'userInput') sendMessage();
        });
    </script>
</body>
</html>
